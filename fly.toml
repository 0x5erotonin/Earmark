# fly.toml app configuration file generated for earmark-hp-cdw on 2026-07-03T19:45:34Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'earmark-hp-cdw'
primary_region = 'ams'

[build]

[env]
  DATA_DIR = '/data'

[[mounts]]
  source = 'earmark_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
